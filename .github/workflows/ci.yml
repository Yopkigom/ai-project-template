name: src CI (lint + test)

# ⚠️ 이 워크플로의 잡들은 브랜치 보호의 required status check 대상입니다.
#    required check는 "모든 PR에서 반드시 생성"되어야 하므로 paths 필터를 걸지 않습니다.
#    (paths 필터 + required check 조합은 해당 경로 변경이 없는 PR에서 체크가 생성되지 않아
#     머지가 영원히 "Expected" 상태로 블록되는 유명한 함정입니다.)
#    문서 전용 변경에서 CI 비용을 줄이고 싶다면 paths 필터 대신
#    dorny/paths-filter 같은 잡 내부 필터를 쓰세요.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    # ⚠️ 이 name은 scripts/setup-github.sh의 required_status_checks.contexts와 일치해야 합니다.
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # pyproject.toml requires-python과 싱크 정렬

      # mypy가 core 의존성(fastapi/pydantic)의 타입을 해석하려면 패키지가 설치돼 있어야 한다.
      # 무거운 extra는 설치하지 않아 CI를 가볍게 유지 — 그쪽 모듈은 [tool.mypy] overrides로 처리.
      - name: Install package + static analysis tools
        run: pip install -e ".[dev]"

      - name: ruff lint
        run: ruff check src tests

      - name: ruff format check
        run: ruff format --check src tests

      - name: Type check (mypy)
        run: mypy

  test:
    # ⚠️ 이 name도 required_status_checks.contexts와 일치해야 합니다.
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    # lint 통과 후에만 실행 (자원 절약)
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -e ".[dev]"

      - run: pytest -v
